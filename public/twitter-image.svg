<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="600" fill="#070B14"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5AFB;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#9C5DFF;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A5AFB" />
      <stop offset="100%" style="stop-color:#9C5DFF" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#gradient1)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="600" fill="url(#grid)"/>
  
  <!-- Logo icon (top left) -->
  <g transform="translate(60, 50)">
    <rect width="40" height="40" rx="10" fill="url(#brandGradient)"/>
    <path d="M 20 12 L 28 20 L 20 28 L 12 20 Z" fill="white" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Brand name -->
  <text x="115" y="80" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="white">
    AdsPilot
  </text>
  
  <!-- Main title -->
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="white">
    +500 Templates Pub Meta
  </text>
  <text x="60" y="260" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="url(#brandGradient)">
    Optimisés pour l'Afrique
  </text>
  
  <!-- Subtitle -->
  <text x="60" y="340" font-family="Arial, sans-serif" font-size="32" font-weight="500" fill="rgba(255,255,255,0.8)">
    Lancez vos campagnes en 5 min
  </text>
  
  <!-- Features badges -->
  <g transform="translate(60, 390)">
    <rect width="140" height="40" rx="20" fill="rgba(90,90,251,0.15)" stroke="#5A5AFB" stroke-width="1"/>
    <text x="70" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#5A5AFB" text-anchor="middle">
      Shopify
    </text>
  </g>
  
  <g transform="translate(220, 390)">
    <rect width="140" height="40" rx="20" fill="rgba(90,90,251,0.15)" stroke="#5A5AFB" stroke-width="1"/>
    <text x="70" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#5A5AFB" text-anchor="middle">
      Canva
    </text>
  </g>
  
  <g transform="translate(380, 390)">
    <rect width="140" height="40" rx="20" fill="rgba(90,90,251,0.15)" stroke="#5A5AFB" stroke-width="1"/>
    <text x="70" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#5A5AFB" text-anchor="middle">
      Analytics
    </text>
  </g>
  
  <!-- CTA -->
  <g transform="translate(60, 480)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="white">
      🚀 Essai Gratuit →
    </text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="url(#brandGradient)">
      ads-pilot.app
    </text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="1000" cy="120" r="70" fill="url(#brandGradient)" opacity="0.1"/>
  <circle cx="1050" cy="400" r="100" fill="url(#brandGradient)" opacity="0.08"/>
</svg>
